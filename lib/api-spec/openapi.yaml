openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Kyrgyzstán Zájezdy API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: trips
    description: Trip listings
  - name: dates
    description: Trip dates (termíny)
  - name: bookings
    description: Booking management
  - name: payments
    description: Payment processing
  - name: gallery
    description: Photo gallery
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List all active trips
      responses:
        "200":
          description: List of active trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"

  /trips/{id}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get trip details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Trip not found

  /trips/{id}/dates:
    get:
      operationId: getTripDates
      tags: [dates]
      summary: Get departure dates for a trip (public)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of dates ordered by departure_date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripDate"
        "404":
          description: Trip not found

  /trips/{id}/gallery:
    get:
      operationId: getTripGallery
      tags: [gallery]
      summary: Get photos for a specific trip (public)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photos for this trip ordered by sortOrder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryPhoto"
        "404":
          description: Trip not found

  /trips/{id}/bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
        "404":
          description: Trip not found

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get booking details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Booking not found

  /bookings/{id}/stripe-session:
    post:
      operationId: createStripeSession
      tags: [payments]
      summary: Create Stripe checkout session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stripe checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeSessionResult"
        "400":
          description: Bad request
        "404":
          description: Booking not found

  /bookings/{id}/qr-payment:
    get:
      operationId: getQrPayment
      tags: [payments]
      summary: Get QR payment details for a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: QR payment details including base64 QR image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrPaymentDetails"
        "404":
          description: Booking not found

  /stripe/webhook:
    post:
      operationId: stripeWebhook
      tags: [payments]
      summary: Stripe webhook handler
      responses:
        "200":
          description: Webhook processed

  /admin/trips:
    get:
      operationId: adminListTrips
      tags: [trips]
      summary: Admin - list all trips including inactive
      responses:
        "200":
          description: All trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
    post:
      operationId: adminCreateTrip
      tags: [trips]
      summary: Admin - create a new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripInput"
      responses:
        "201":
          description: Created trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /admin/trips/{id}:
    patch:
      operationId: adminUpdateTrip
      tags: [trips]
      summary: Admin - update a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripUpdate"
      responses:
        "200":
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Not found
    delete:
      operationId: adminDeleteTrip
      tags: [trips]
      summary: Admin - delete a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/trips/{id}/dates:
    get:
      operationId: adminListTripDates
      tags: [dates]
      summary: Admin - list dates for a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dates for the trip
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripDate"
    post:
      operationId: adminCreateTripDate
      tags: [dates]
      summary: Admin - add a departure date to a trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripDateInput"
      responses:
        "201":
          description: Created date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDate"
        "404":
          description: Trip not found

  /admin/dates/{id}:
    delete:
      operationId: adminDeleteTripDate
      tags: [dates]
      summary: Admin - delete a departure date
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /admin/bookings:
    get:
      operationId: adminListBookings
      tags: [bookings]
      summary: Admin - list all bookings
      responses:
        "200":
          description: All bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"

  /admin/bookings/{id}/status:
    patch:
      operationId: adminUpdateBookingStatus
      tags: [bookings]
      summary: Admin - update booking status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingStatusUpdate"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /auth/status:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Get current authentication status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/setup:
    post:
      operationId: setupAdminPassword
      tags: [auth]
      summary: Set the admin password for the first time
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupPasswordBody"
      responses:
        "200":
          description: Password set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "400":
          description: Password already set or invalid input

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Login to admin panel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid password

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Logout from admin panel
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"

  /gallery:
    get:
      operationId: listGalleryPhotos
      tags: [gallery]
      summary: List all gallery photos (public)
      responses:
        "200":
          description: Gallery photos ordered by sortOrder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryPhoto"

  /admin/gallery:
    get:
      operationId: adminListGalleryPhotos
      tags: [gallery]
      summary: Admin - list all gallery photos
      responses:
        "200":
          description: All gallery photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryPhoto"
    post:
      operationId: adminCreateGalleryPhoto
      tags: [gallery]
      summary: Admin - add a gallery photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryPhotoInput"
      responses:
        "201":
          description: Created photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryPhoto"

  /admin/gallery/{id}:
    patch:
      operationId: adminUpdateGalleryPhoto
      tags: [gallery]
      summary: Admin - update a gallery photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryPhotoInput"
      responses:
        "200":
          description: Updated photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryPhoto"
        "404":
          description: Not found
    delete:
      operationId: adminDeleteGalleryPhoto
      tags: [gallery]
      summary: Admin - delete a gallery photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [bookings]
      summary: Admin dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Trip:
      type: object
      required: [id, name, destination, description, priceCzk, days, availableSpots, active]
      properties:
        id:
          type: integer
        name:
          type: string
        destination:
          type: string
        description:
          type: string
        priceCzk:
          type: number
        days:
          type: integer
        imageUrl:
          type: ["string", "null"]
        availableSpots:
          type: integer
        active:
          type: boolean
        depositAmount:
          type: number
        priceIncludes:
          type: ["string", "null"]
        priceExcludes:
          type: ["string", "null"]

    TripInput:
      type: object
      required: [name, destination, description, priceCzk, days]
      properties:
        name:
          type: string
        destination:
          type: string
        description:
          type: string
        priceCzk:
          type: number
        days:
          type: integer
        imageUrl:
          type: string
        availableSpots:
          type: integer
        active:
          type: boolean
        priceIncludes:
          type: string
        priceExcludes:
          type: string

    TripUpdate:
      type: object
      properties:
        name:
          type: string
        destination:
          type: string
        description:
          type: string
        priceCzk:
          type: number
        days:
          type: integer
        imageUrl:
          type: string
        availableSpots:
          type: integer
        active:
          type: boolean
        priceIncludes:
          type: string
        priceExcludes:
          type: string

    Booking:
      type: object
      required: [id, tripId, customerName, customerEmail, bookingType, paymentMethod, amountCzk, status, createdAt]
      properties:
        id:
          type: integer
        tripId:
          type: integer
        tripDateId:
          type: ["integer", "null"]
        trip:
          $ref: "#/components/schemas/Trip"
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: ["string", "null"]
        bookingType:
          type: string
          enum: [deposit, full]
        paymentMethod:
          type: string
          enum: [card, qr]
        amountCzk:
          type: number
        status:
          type: string
          enum: [pending, deposit_paid, fully_paid, cancelled]
        stripeSessionId:
          type: ["string", "null"]
        createdAt:
          type: string

    BookingInput:
      type: object
      required: [customerName, customerEmail, bookingType, paymentMethod]
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
        tripDateId:
          type: integer
          nullable: true
        bookingType:
          type: string
          enum: [deposit, full]
        paymentMethod:
          type: string
          enum: [card, qr]

    BookingStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, deposit_paid, fully_paid, cancelled]

    StripeSessionResult:
      type: object
      required: [url]
      properties:
        url:
          type: string

    QrPaymentDetails:
      type: object
      required: [bookingId, iban, recipientName, amountCzk, variableSymbol, qrBase64, tripName, customerEmail]
      properties:
        bookingId:
          type: integer
        iban:
          type: string
        recipientName:
          type: string
        amountCzk:
          type: number
        variableSymbol:
          type: string
        qrBase64:
          type: string
        tripName:
          type: string
        customerEmail:
          type: string

    AuthStatus:
      type: object
      required: [authenticated, hasPassword]
      properties:
        authenticated:
          type: boolean
        hasPassword:
          type: boolean

    AuthResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string

    LoginBody:
      type: object
      required: [password]
      properties:
        password:
          type: string

    SetupPasswordBody:
      type: object
      required: [password]
      properties:
        password:
          type: string

    TripDate:
      type: object
      required: [id, tripId, departureDate]
      properties:
        id:
          type: integer
        tripId:
          type: integer
        departureDate:
          type: string
          description: ISO date YYYY-MM-DD
        returnDate:
          type: ["string", "null"]
          description: ISO date YYYY-MM-DD
        availableSpots:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]

    TripDateInput:
      type: object
      required: [departureDate]
      properties:
        departureDate:
          type: string
          description: ISO date YYYY-MM-DD
        returnDate:
          type: string
          description: ISO date YYYY-MM-DD
        availableSpots:
          type: integer
        notes:
          type: string

    GalleryPhoto:
      type: object
      required: [id, tripId, imageUrl, caption, location, sortOrder]
      properties:
        id:
          type: integer
        tripId:
          type: integer
        tripName:
          type: string
        imageUrl:
          type: string
        caption:
          type: string
        location:
          type: string
        sortOrder:
          type: integer

    GalleryPhotoInput:
      type: object
      required: [tripId, imageUrl, caption]
      properties:
        tripId:
          type: integer
        imageUrl:
          type: string
        caption:
          type: string
        location:
          type: string
        sortOrder:
          type: integer

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AdminStats:
      type: object
      required: [totalBookings, pendingBookings, paidBookings, totalRevenueCzk, activeTrips]
      properties:
        totalBookings:
          type: integer
        pendingBookings:
          type: integer
        paidBookings:
          type: integer
        totalRevenueCzk:
          type: number
        activeTrips:
          type: integer
